backend:
  name: git-gateway
  branch: main

site_url: https://lyzeum167kyiv.netlify.app

media_folder: "public/images"
public_folder: "/images"

locale: "uk"

collections:

  # ─────────────────────────────────────
  # ГОЛОВНА
  # ─────────────────────────────────────
  - name: "home"
    label: "🏠 Головна"
    files:
      - name: "home"
        label: "Головна сторінка"
        file: "content/pages/home.json"

        fields:
          - { label: "Заголовок 1", name: "hero_title_1", widget: "string" }
          - { label: "Заголовок 2", name: "hero_title_2", widget: "string" }
          - { label: "Заголовок 3", name: "hero_title_3", widget: "string" }

          - { label: "Підзаголовок", name: "hero_subtitle", widget: "text" }

          - { label: "Фонове фото", name: "hero_image", widget: "image", required: false }

          - label: "Статистика"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Число", name: "value", widget: "string" }
              - { label: "Текст", name: "label", widget: "string" }

          - label: "Переваги"
            name: "features"
            widget: "list"
            fields:
              - { label: "Іконка", name: "icon", widget: "string" }
              - { label: "Назва", name: "title", widget: "string" }
              - { label: "Опис", name: "text", widget: "text" }
              - { label: "Бейдж", name: "badge", widget: "string", required: false }

  # ─────────────────────────────────────
  # ПРО НАС
  # ─────────────────────────────────────
  - name: "about"
    label: "🏫 Про нас"
    files:
      - name: "about"
        label: "Про нас"
        file: "content/pages/about.json"

        fields:

          # HERO
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Бейдж", name: "badge", widget: "string" }
              - { label: "Заголовок", name: "title", widget: "string" }
              - { label: "Виділене слово", name: "highlight", widget: "string" }
              - { label: "Опис", name: "description", widget: "text" }
              - { label: "Фонове фото", name: "background_image", widget: "image" }
              - { label: "Текст кнопки DSD", name: "dsd_button_text", widget: "string" }
              - { label: "Посилання DSD", name: "dsd_button_url", widget: "string" }

          # МІСІЯ
          - label: "Місія"
            name: "mission"
            widget: "object"
            fields:
              - { label: "Бейдж", name: "badge", widget: "string" }
              - { label: "Заголовок", name: "title", widget: "string" }
              - { label: "Опис", name: "description", widget: "text" }

              - label: "Пункти"
                name: "bullets"
                widget: "list"
                field:
                  label: "Пункт"
                  name: "bullet"
                  widget: "string"

              - label: "Картинки"
                name: "images"
                widget: "list"
                field:
                  label: "Фото"
                  name: "image"
                  widget: "image"

          # ХРОНОЛОГІЯ
          - label: "Хронологія"
            name: "timeline"
            widget: "object"
            fields:
              - { label: "Бейдж", name: "badge", widget: "string" }
              - { label: "Заголовок", name: "title", widget: "string" }

              - label: "Події"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Рік", name: "year", widget: "string" }
                  - { label: "Подія", name: "event", widget: "text" }

          # ЦІННОСТІ
          - label: "Цінності"
            name: "values"
            widget: "object"
            fields:
              - { label: "Бейдж", name: "badge", widget: "string" }
              - { label: "Заголовок", name: "title", widget: "string" }

              - label: "Картки"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Назва", name: "title", widget: "string" }
                  - { label: "Опис", name: "description", widget: "text" }

  # ─────────────────────────────────────
  # НАВЧАННЯ
  # ─────────────────────────────────────
  - name: "education"
    label: "📚 Навчання"
    files:
      - name: "education"
        label: "Навчання"
        file: "content/pages/education.json"

        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Підзаголовок", name: "subtitle", widget: "text" }

          - label: "Програми"
            name: "programs"
            widget: "list"
            fields:
              - { label: "Назва", name: "title", widget: "string" }
              - { label: "Бейдж", name: "badge", widget: "string", required: false }
              - { label: "Опис", name: "description", widget: "text" }

              - label: "Пункти"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Текст", name: "text", widget: "string" }

          - label: "Рівні"
            name: "levels"
            widget: "list"
            fields:
              - { label: "Назва", name: "title", widget: "string" }
              - { label: "Опис", name: "description", widget: "text" }

          - label: "Предмети"
            name: "subjects"
            widget: "list"
            fields:
              - { label: "Іконка", name: "icon", widget: "string" }
              - { label: "Назва", name: "title", widget: "string" }

  # ─────────────────────────────────────
  # СІМЕЙНЕ
  # ─────────────────────────────────────
  - name: "family"
    label: "👨‍👩‍👧 Сімейне навчання"
    files:
      - name: "family"
        label: "Сімейне навчання"
        file: "content/pages/family.json"

        fields:
          - { label: "Заголовок", name: "title", widget: "string" }

          - { label: "Підзаголовок", name: "subtitle", widget: "text" }

          - label: "Секції"
            name: "sections"
            widget: "list"
            fields:
              - { label: "Назва", name: "title", widget: "string" }

              - { label: "Опис", name: "description", widget: "text" }

              - { label: "Бейдж", name: "badge", widget: "string", required: false }

              - label: "Семестри"
                name: "semesters"
                widget: "list"
                fields:
                  - { label: "Назва", name: "label", widget: "string" }

                  - label: "Класи"
                    name: "classes"
                    widget: "list"
                    fields:
                      - { label: "Назва класу", name: "name", widget: "string" }
                      - { label: "Посилання", name: "url", widget: "string" }

  # ─────────────────────────────────────
  # НОВИНИ
  # ─────────────────────────────────────
  - name: "news"
    label: "📰 Новини"
    folder: "content/news"
    create: true
    slug: "{{slug}}"

    fields:
      - { label: "Заголовок", name: "title", widget: "string" }

      - { label: "Дата", name: "date", widget: "datetime" }

      - { label: "Фото", name: "image", widget: "image", required: false }

      - { label: "Короткий опис", name: "excerpt", widget: "text", required: false }

      - { label: "Текст", name: "body", widget: "markdown" }

  # ─────────────────────────────────────
  # ВІДКРИТІСТЬ
  # ─────────────────────────────────────
  - name: "transparency"
    label: "📋 Відкритість"
    files:
      - name: "transparency"
        label: "Відкритість"
        file: "content/pages/transparency.json"

        fields:
          - label: "DSD документ"
            name: "dsd_document"
            widget: "object"

            fields:
              - { label: "Назва", name: "title", widget: "string" }
              - { label: "PDF", name: "file", widget: "file", required: false }
              - { label: "Посилання", name: "url", widget: "string", required: false }

          - label: "Документи"
            name: "documents"
            widget: "list"

            fields:
              - { label: "Назва", name: "title", widget: "string" }

              - { label: "PDF", name: "file", widget: "file", required: false }

              - { label: "Посилання", name: "url", widget: "string", required: false }

              - label: "Піддокументи"
                name: "children"
                widget: "list"
                required: false

                fields:
                  - { label: "Назва", name: "title", widget: "string" }
                  - { label: "Посилання", name: "url", widget: "string" }

  # ─────────────────────────────────────
  # КОНТАКТИ
  # ─────────────────────────────────────
  - name: "contacts"
    label: "📞 Контакти"
    files:
      - name: "contacts"
        label: "Контакти"
        file: "content/pages/contacts.json"

        fields:
          - { label: "Адреса", name: "address", widget: "string" }

          - label: "Телефони"
            name: "phones"
            widget: "list"

            fields:
              - { label: "Номер", name: "number", widget: "string" }
              - { label: "Підпис", name: "label", widget: "string" }

          - { label: "Email", name: "email", widget: "string" }

          - { label: "Графік роботи", name: "working_hours", widget: "string" }

          - { label: "Instagram", name: "instagram", widget: "string", required: false }

          - { label: "Facebook", name: "facebook", widget: "string", required: false }

          - { label: "Google Maps", name: "maps_url", widget: "string", required: false }
