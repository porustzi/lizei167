name: Опублікувати все
on:
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Merge all CMS drafts
        run: |
          git config user.name "CMS Publisher"
          git config user.email "cms@users.noreply.github.com"
          git fetch origin
          branches=$(git branch -r | grep 'origin/cms/' | sed 's|origin/||' | tr '\n' ' ' || true)
          if [ -n "$branches" ]; then
            for branch in $branches; do
              echo "→ Мержу $branch..."
              git merge "origin/$branch" --no-edit --allow-unrelated-histories || echo "⚠️  Конфлікт у $branch, пропускаю"
            done
          else
            echo "✓ Немає чернеток для публікації"
          fi
      - name: Push to main
        run: git push origin main
