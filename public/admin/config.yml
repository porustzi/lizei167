backend:
  name: git-gateway
  branch: main

site_url: https://lyzeum167kyiv.netlify.app
media_folder: "public/images"
public_folder: "/images"

locale: "uk"

collections:

  # ─────────────────────────────────────
  # ГОЛОВНА
  # ─────────────────────────────────────
  - name: "home"
    label: "🏠 Головна сторінка"
    files:
      - name: "home"
        label: "Головна"
        file: "content/pages/home.json"
        fields:
          - { label: "Заголовок (рядок 1)", name: "hero_title_1", widget: "string" }
          - { label: "Заголовок (рядок 2, червоний)", name: "hero_title_2", widget: "string" }
          - { label: "Заголовок (рядок 3)", name: "hero_title_3", widget: "string" }
          - { label: "Підзаголовок", name: "hero_subtitle", widget: "string" }
          - { label: "Фонове фото", name: "hero_image", widget: "image", required: false }
          - label: "Статистика (лічильники)"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Число", name: "value", widget: "string" }
              - { label: "Підпис", name: "label", widget: "string" }
          - label: "Блоки переваг (4 картки)"
            name: "features"
            widget: "list"
            fields:
              - { label: "Іконка (емодзі)", name: "icon", widget: "string" }
              - { label: "Заголовок", name: "title", widget: "string" }
              - { label: "Текст", name: "text", widget: "text" }
              - { label: "Мітка", name: "badge", widget: "string", required: false }

  # ─────────────────────────────────────
  # ПРО НАС
  # ─────────────────────────────────────
  - name: "about"
    label: "🏫 Про нас"
    files:
      - name: "about"
        label: "Про нас"
        file: "content/pages/about.json"
        fields:
          - { label: "Заголовок секції", name: "title", widget: "string" }
          - { label: "Підзаголовок", name: "subtitle", widget: "text" }
          - { label: "Основний текст", name: "body", widget: "markdown" }
          - label: "Фотографії (колаж)"
            name: "photos"
            widget: "list"
            fields:
              - { label: "Фото", name: "image", widget: "image" }
          - label: "Переваги (список з галочками)"
            name: "advantages"
            widget: "list"
            fields:
              - { label: "Текст", name: "text", widget: "string" }
          - label: "Таймлайн (історія)"
            name: "timeline"
            widget: "list"
            fields:
              - { label: "Рік", name: "year", widget: "string" }
              - { label: "Подія", name: "event", widget: "text" }
          - label: "Цінності (картки 'Що нами керує')"
            name: "values"
            widget: "list"
            fields:
              - { label: "Іконка (емодзі)", name: "icon", widget: "string" }
              - { label: "Заголовок", name: "title", widget: "string" }
              - { label: "Текст", name: "text", widget: "text" }

  # ─────────────────────────────────────
  # НАВЧАННЯ
  # ─────────────────────────────────────
  - name: "education"
    label: "📚 Навчання"
    files:
      - name: "education"
        label: "Програми навчання"
        file: "content/pages/education.json"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Підзаголовок", name: "subtitle", widget: "string" }
          - label: "Програми (акордеон)"
            name: "programs"
            widget: "list"
            fields:
              - { label: "Назва", name: "title", widget: "string" }
              - { label: "Мітка", name: "badge", widget: "string", required: false }
              - { label: "Опис", name: "description", widget: "text" }
              - label: "Пункти (список)"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Текст", name: "text", widget: "string" }
          - label: "Рівні німецької (картки)"
            name: "levels"
            widget: "list"
            fields:
              - { label: "Назва рівня", name: "title", widget: "string" }
              - { label: "Опис", name: "description", widget: "text" }
          - label: "Інші дисципліни"
            name: "subjects"
            widget: "list"
            fields:
              - { label: "Іконка (емодзі)", name: "icon", widget: "string" }
              - { label: "Назва", name: "title", widget: "string" }

  # ─────────────────────────────────────
  # НОВИНИ
  # ─────────────────────────────────────
  - name: "news"
    label: "📰 Новини"
    folder: "content/news"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Заголовок", name: "title", widget: "string" }
      - { label: "Дата", name: "date", widget: "datetime" }
      - { label: "Обкладинка", name: "image", widget: "image", required: false }
      - { label: "Короткий опис", name: "excerpt", widget: "text", required: false }
      - { label: "Текст", name: "body", widget: "markdown" }

  # ─────────────────────────────────────
  # ВІДГУКИ
  # ─────────────────────────────────────
  - name: "reviews"
    label: "⭐ Відгуки"
    folder: "content/reviews"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Ім'я", name: "name", widget: "string" }
      - { label: "Роль (напр. Мама учня 5 класу)", name: "role", widget: "string" }
      - { label: "Оцінка (1-5)", name: "rating", widget: "number", value_type: "int", min: 1, max: 5, default: 5 }
      - { label: "Дата", name: "date", widget: "datetime" }
      - { label: "Текст відгуку", name: "body", widget: "text" }
      - { label: "Джерело", name: "source", widget: "select", options: ["Google", "Facebook", "Instagram", "Особисто"], default: "Google" }

  # ─────────────────────────────────────
  # ВІДКРИТІСТЬ
  # ─────────────────────────────────────
  - name: "transparency"
    label: "📋 Відкритість"
    files:
      - name: "transparency"
        label: "Відкритість"
        file: "content/pages/transparency.json"
        fields:
          - label: "Угода про DSD школу"
            name: "dsd_document"
            widget: "object"
            fields:
              - { label: "Назва", name: "title", widget: "string" }
              - { label: "Файл PDF", name: "file", widget: "file", required: false }
              - { label: "Посилання", name: "url", widget: "string", required: false }
          - label: "Документи (17 пунктів)"
            name: "documents"
            widget: "list"
            fields:
              - { label: "Назва", name: "title", widget: "string" }
              - { label: "Файл PDF", name: "file", widget: "file", required: false }
              - { label: "Посилання", name: "url", widget: "string", required: false }
              - label: "Піддокументи"
                name: "children"
                widget: "list"
                required: false
                fields:
                  - { label: "Назва", name: "title", widget: "string" }
                  - { label: "Посилання", name: "url", widget: "string" }

  # ─────────────────────────────────────
  # КОНТАКТИ
  # ─────────────────────────────────────
  - name: "contacts"
    label: "📞 Контакти"
    files:
      - name: "contacts"
        label: "Контакти"
        file: "content/pages/contacts.json"
        fields:
          - { label: "Адреса", name: "address", widget: "string" }
          - label: "Телефони"
            name: "phones"
            widget: "list"
            fields:
              - { label: "Номер", name: "number", widget: "string" }
              - { label: "Підпис (напр. Секретар)", name: "label", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Графік роботи", name: "working_hours", widget: "string" }
          - { label: "Посилання Instagram", name: "instagram", widget: "string", required: false }
          - { label: "Посилання Facebook", name: "facebook", widget: "string", required: false }
          - { label: "Посилання Google Maps", name: "maps_url", widget: "string", required: false }
