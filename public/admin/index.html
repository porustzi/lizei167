<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Адмінка — Ліцей №167</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .logo {
      width: 64px; height: 64px;
      background: #dc2626;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.5rem;
      color: #fff;
      font-weight: 800;
    }
    .card {
      background: #fff;
      border-radius: 1.5rem;
      padding: 2.5rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.15);
      text-align: center;
    }
    .card h1 { font-size: 1.5rem; font-weight: 700; color: #1e293b; margin-bottom: .25rem; }
    .card p { color: #64748b; font-size: .9rem; margin-bottom: 1.5rem; }
    .card input {
      width: 100%;
      padding: .85rem 1.2rem;
      border: 2px solid #e2e8f0;
      border-radius: 1rem;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
      margin-bottom: .75rem;
    }
    .card input:focus { border-color: #dc2626; }
    .card button {
      width: 100%;
      padding: .85rem;
      background: #dc2626;
      color: #fff;
      border: none;
      border-radius: 1rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .15s;
    }
    .card button:hover { background: #b91c1c; transform: scale(1.02); }
    .card button:active { transform: scale(.98); }
    .card button:disabled { opacity: .6; cursor: wait; transform: none; }
    .error { color: #dc2626; font-size: .875rem; margin-top: .5rem; display: none; }
    .error.show { display: block; }
    #login { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 400px; padding: 2rem; }
    #cms { display: none; width: 100%; }
    #cms.active { display: block; }
    .loading { text-align: center; padding: 3rem 2rem; color: #64748b; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e2e8f0;
      border-top-color: #dc2626;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="login">
    <div class="card">
      <div class="logo">167</div>
      <h1>Адмінка Ліцею №167</h1>
      <p>Увійдіть для керування сайтом</p>
      <form id="loginForm">
        <input type="text" id="username" placeholder="Логін" autocomplete="username" required />
        <input type="password" id="password" placeholder="Пароль" autocomplete="current-password" required />
        <button type="submit" id="loginBtn">Увійти</button>
        <div class="error" id="loginError"></div>
      </form>
    </div>
  </div>

  <div id="cms">
    <div class="loading" id="cmsLoader">
      <div class="spinner"></div>
      <p>Завантаження адмінки...</p>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      btn.disabled = true;
      btn.textContent = 'Вхід...';
      err.classList.remove('show');

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Помилка входу');

        const tokenRes = await fetch('/api/auth/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: 'admin', password: document.getElementById('password').value }),
        });
        const tokenData = await tokenRes.json();
        if (!tokenRes.ok) throw new Error('Помилка авторизації');

        localStorage.setItem('git-gateway:t', tokenData.access_token);
        sessionStorage.setItem('cms_session', '1');
        loadCMS();
      } catch (e) {
        err.textContent = e.message;
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Увійти';
      }
    });

    function loadCMS() {
      document.getElementById('login').style.display = 'none';
      document.getElementById('cms').classList.add('active');
      const script = document.createElement('script');
      script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
      script.onload = () => {
        document.getElementById('cmsLoader').style.display = 'none';
      };
      document.body.appendChild(script);
    }

    if (sessionStorage.getItem('cms_session')) {
      loadCMS();
    }
  </script>
</body>
</html>
