<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      (function(){
        var s = document.createElement('style');
        s.textContent = [
          '.pp-btn{position:fixed;bottom:28px;right:28px;z-index:999999;background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;border:none;border-radius:999px;padding:16px 32px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 10px 30px -5px rgba(220,38,38,0.5);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;align-items:center;gap:10px;transition:transform .15s;animation:pp-pulse 2s infinite}',
          '.pp-btn:hover{transform:scale(1.08)}',
          '.pp-btn:disabled{opacity:.6;cursor:wait;animation:none}',
          '@keyframes pp-pulse{0%,100%{box-shadow:0 0 20px rgba(220,38,38,0.4)}50%{box-shadow:0 0 40px rgba(220,38,38,0.7)}}',
          '.pp-toast{position:fixed;bottom:100px;right:28px;z-index:999999;background:#1e293b;color:#fff;border-radius:16px;padding:14px 20px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:13px;max-width:360px;box-shadow:0 10px 30px rgba(0,0,0,.3);display:none;line-height:1.4;border-left:4px solid #334155}',
          '.pp-toast.show{display:block}',
          '.pp-toast.ok{border-left-color:#4ade80}',
          '.pp-toast.err{border-left-color:#dc2626}',
          '.pp-toast.busy{border-left-color:#fbbf24}',
          '.pp-spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:pp-spin .6s linear infinite;vertical-align:middle;margin-right:6px}',
          '@keyframes pp-spin{to{transform:rotate(360deg)}}'
        ].join('');
        document.head.appendChild(s);

        function toast(type, title, desc) {
          var el = document.getElementById('ppToast');
          el.className = 'pp-toast show ' + (type||'');
          el.innerHTML = '<div style="font-weight:700;margin-bottom:2px">' + title + '</div><div style="color:#94a3b8;font-size:12px">' + (desc||'') + '</div>';
          if (type !== 'busy') setTimeout(function(){ el.classList.remove('show'); }, 5000);
        }

        function allProps(obj) {
          if (!obj) return '(null)';
          var out = {};
          try {
            // own enumerable
            Object.keys(obj).forEach(function(k){ out[k] = typeof obj[k]; });
            // all own props including non-enumerable
            Object.getOwnPropertyNames(obj).forEach(function(k) {
              if (!(k in out)) out[k] = typeof obj[k];
            });
            // prototype
            var proto = Object.getPrototypeOf(obj);
            if (proto && proto.constructor) {
              Object.getOwnPropertyNames(proto).forEach(function(k) {
                if (k !== 'constructor' && !(k in out)) out[k] = typeof obj[k];
              });
            }
          } catch(e) {}
          return Object.keys(out).sort().join(', ');
        }

        async function doPublish() {
          var btn = document.getElementById('ppBtn');
          try {
            btn.disabled = true;
            btn.innerHTML = '<span class="pp-spin"></span> Публікація...';
            toast('busy', '🔄 Публікую всі чернетки...', '');

            // diagnostic: explore window.CMS
            var cmsKeys = allProps(window.CMS);
            var hasRedux = typeof window.__REDUX_DEVTOOLS_EXTENSION__ !== 'undefined';
            var niKeys = allProps(window.netlifyIdentity);

            toast('busy', '🔄 Діагностика: ' + cmsKeys.slice(0, 80) + '...', '');

            // get JWT
            var user = await new Promise(function(res, rej) {
              var check = setInterval(function() {
                var u = window.netlifyIdentity && window.netlifyIdentity.currentUser();
                if (u) { clearInterval(check); res(u); }
              }, 300);
              setTimeout(function() { clearInterval(check); rej(new Error('Netlify Identity not ready')); }, 15000);
            });
            var jwt = await user.jwt();

            var encoded = 'platstarinum-prog%2Flizei167';

            // try gateway URLs in order
            var GITS = [
              '/.netlify/git/gateway',
              '/.netlify/git',
              '/.netlify/git/github',
            ];
            var branches = null;
            var baseURL = '';
            var errors = [];
            for (var i = 0; i < GITS.length; i++) {
              var url = GITS[i] + '/' + encoded + '/branches';
              try {
                var res = await fetch(url, { headers: { Authorization: 'Bearer ' + jwt } });
                var ct = (res.headers.get('Content-Type') || '').slice(0,40);
                var text = await res.text();
                if (res.ok && text) {
                  try { var j = JSON.parse(text); if (Array.isArray(j)) { branches = j; baseURL = GITS[i]; break; } } catch(e) {}
                }
                errors.push(GITS[i] + ' → ' + res.status + ' [' + ct + '] ' + text.slice(0,50).replace(/\n/g,' '));
              } catch(e) {
                errors.push(GITS[i] + ' ERR: ' + e.message);
              }
            }

            if (!branches) {
              throw new Error('Git Gateway недоступний.\n' + errors.join('\n') + '\n\nCMS keys: ' + cmsKeys.slice(0,200));
            }

            var cms = branches.filter(function(b){ return b.name && b.name.indexOf('cms/') === 0; });
            if (cms.length === 0) {
              toast('ok', '✅ Немає чернеток', 'Сайт актуальний');
              btn.disabled = false;
              btn.innerHTML = '🚀 Опублікувати все';
              return;
            }

            var merged = 0;
            for (var i = 0; i < cms.length; i++) {
              var branch = cms[i];
              btn.innerHTML = '⏳ ' + branch.name + '...';
              toast('busy', '🔄 Мержу ' + branch.name + '...', '');
              try {
                var mr = await fetch(baseURL + '/' + encoded + '/merges', {
                  method: 'POST',
                  headers: { Authorization: 'Bearer ' + jwt, 'Content-Type': 'application/json' },
                  body: JSON.stringify({ base: 'main', head: branch.name, commit_message: 'Publish from Decap CMS' })
                });
                if (mr.ok) { merged++; }
                else { console.warn('Merge fail', branch.name, mr.status, await mr.text()); }
              } catch(e) {
                console.warn('Skip', branch.name, e.message);
              }
            }

            btn.disabled = false;
            btn.innerHTML = '🚀 Опублікувати все';

            if (merged > 0) {
              toast('ok', '✅ Опубліковано ' + merged + '/' + cms.length, 'Зміни скоро з\'являться на сайті');
              setTimeout(function(){ window.location.reload(); }, 2000);
            } else {
              toast('err', '❌ Нічого не опубліковано');
            }
          } catch(e) {
            console.error(e);
            btn.disabled = false;
            btn.innerHTML = '🚀 Опублікувати все';
            toast('err', '❌ Помилка', e.message + '\n\n' + (e.stack || '').split('\n').slice(0,2).join(' | ').slice(0,200));
          }
        }

        function addUI() {
          if (document.getElementById('ppBtn')) return;
          var b = document.createElement('button');
          b.id = 'ppBtn'; b.className = 'pp-btn';
          b.innerHTML = '🚀 Опублікувати все';
          b.onclick = doPublish;
          document.body.appendChild(b);
          var t = document.createElement('div');
          t.id = 'ppToast'; t.className = 'pp-toast';
          document.body.appendChild(t);
        }

        function tryAdd() {
          if (document.querySelector('#app, [class*="App"], [class*="Sidebar"], header, nav, main')) { addUI(); }
          else { setTimeout(tryAdd, 500); }
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', tryAdd);
        else tryAdd();
        setTimeout(addUI, 3000);
      })();
    </script>
  </body>
</html>
