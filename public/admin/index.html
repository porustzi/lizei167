<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      (function() {
        var s = document.createElement('style');
        s.textContent = [
          '.pp-btn{position:fixed;bottom:28px;right:28px;z-index:999999;background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;border:none;border-radius:999px;padding:16px 32px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 10px 30px -5px rgba(220,38,38,0.5);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;align-items:center;gap:10px;transition:transform .15s;animation:pp-pulse 2s infinite}',
          '.pp-btn:hover{transform:scale(1.08)}',
          '.pp-btn:disabled{opacity:.6;cursor:wait;animation:none}',
          '@keyframes pp-pulse{0%,100%{box-shadow:0 0 20px rgba(220,38,38,0.4)}50%{box-shadow:0 0 40px rgba(220,38,38,0.7)}}',
          '.pp-toast{position:fixed;bottom:100px;right:28px;z-index:999999;background:#1e293b;color:#fff;border-radius:16px;padding:14px 20px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:13px;max-width:340px;box-shadow:0 10px 30px rgba(0,0,0,.3);display:none;line-height:1.4}',
          '.pp-toast.show{display:block}',
          '.pp-toast.ok{border-left:4px solid #4ade80}',
          '.pp-toast.err{border-left:4px solid #dc2626}',
          '.pp-toast.busy{border-left:4px solid #fbbf24}',
          '.pp-spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:pp-spin .6s linear infinite;vertical-align:middle;margin-right:6px}',
          '@keyframes pp-spin{to{transform:rotate(360deg)}}'
        ].join('');
        document.head.appendChild(s);

        function toast(type, title, desc) {
          var el = document.getElementById('ppToast');
          el.className = 'pp-toast show ' + type;
          el.innerHTML = '<div style="font-weight:700;margin-bottom:2px">' + title + '</div><div style="color:#94a3b8;font-size:12px">' + desc + '</div>';
          if (type !== 'busy') setTimeout(function(){ el.classList.remove('show'); }, 5000);
        }

        async function doPublish() {
          var btn = document.getElementById('ppBtn');
          try {
            var user = window.netlifyIdentity && typeof window.netlifyIdentity.currentUser === 'function' && window.netlifyIdentity.currentUser();
            if (!user) { toast('err', '❌ Не авторизовано', 'Увійдіть через Netlify Identity'); return; }
            btn.disabled = true;
            btn.innerHTML = '<span class="pp-spin"></span> Публікація...';
            toast('busy', '🔄 Публікую...', 'Мержу чернетки в main');

            var token = await user.jwt();
            var gateway = '/.netlify/git/gateway/repos/platstarinum-prog%2Flizei167';
            var headers = { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' };

            var brRes = await fetch(gateway + '/branches', { headers: headers });
            if (!brRes.ok) throw new Error('Git Gateway: ' + brRes.status);
            var branches = await brRes.json();
            var cms = (Array.isArray(branches) ? branches : []).filter(function(b){ return b.name && b.name.indexOf('cms/') === 0; });

            if (cms.length === 0) {
              toast('ok', '✅ Немає чернеток', 'Сайт актуальний');
              btn.disabled = false; btn.innerHTML = '🚀 Опублікувати все'; return;
            }

            var merged = 0;
            for (var i = 0; i < cms.length; i++) {
              var branch = cms[i];
              btn.innerHTML = '⏳ ' + branch.name + '...';
              var mRes = await fetch(gateway + '/merges', {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({ base: 'main', head: branch.name, commit_message: 'Publish from Decap CMS' })
              });
              if (mRes.ok || mRes.status === 204) merged++;
            }

            btn.disabled = false; btn.innerHTML = '🚀 Опублікувати все';
            if (merged > 0) toast('ok', '✅ Опубліковано ' + merged, 'Зміни скоро з\'являться на сайті');
            else toast('err', '❌ Нічого не опубліковано', 'Можливо, все вже актуально');
          } catch(e) {
            console.error(e);
            btn.disabled = false; btn.innerHTML = '🚀 Опублікувати все';
            toast('err', '❌ Помилка', e.message);
          }
        }

        function addButton() {
          if (document.getElementById('ppBtn')) return;
          var b = document.createElement('button');
          b.id = 'ppBtn'; b.className = 'pp-btn';
          b.innerHTML = '🚀 Опублікувати все';
          b.onclick = doPublish;
          document.body.appendChild(b);
          var t = document.createElement('div');
          t.id = 'ppToast'; t.className = 'pp-toast';
          document.body.appendChild(t);
        }

        function tryAdd() {
          if (document.querySelector('#app, [class*="App"], [class*="Sidebar"], [class*="Collection"], header, nav, main')) {
            addButton();
          } else {
            setTimeout(tryAdd, 500);
          }
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', tryAdd);
        else tryAdd();
        setTimeout(addButton, 4000);
      })();
    </script>
  </body>
</html>
