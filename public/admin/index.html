<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      const style = document.createElement('style');
      style.textContent = `
        @keyframes pulse-glow {
          0%, 100% { box-shadow: 0 0 20px rgba(220,38,38,0.4); }
          50% { box-shadow: 0 0 40px rgba(220,38,38,0.7); }
        }
        .btn-publish-all {
          position: fixed;
          bottom: 28px;
          right: 28px;
          z-index: 999999;
          background: linear-gradient(135deg, #dc2626, #b91c1c);
          color: #fff;
          border: none;
          border-radius: 999px;
          padding: 18px 36px;
          font-size: 20px;
          font-weight: 800;
          cursor: pointer;
          text-decoration: none;
          box-shadow: 0 10px 30px -5px rgba(220,38,38,0.5);
          transition: transform 0.15s, box-shadow 0.15s;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          letter-spacing: 0.02em;
          display: flex;
          align-items: center;
          gap: 12px;
          animation: pulse-glow 2s infinite;
        }
        .btn-publish-all:hover {
          transform: scale(1.08);
          box-shadow: 0 20px 40px -5px rgba(220,38,38,0.7);
        }
        .btn-publish-all:active {
          transform: scale(0.96);
        }
        .btn-publish-all .badge {
          background: rgba(255,255,255,0.2);
          border-radius: 999px;
          padding: 2px 10px;
          font-size: 14px;
          font-weight: 700;
        }
      `;
      document.head.appendChild(style);

      function addButton() {
        const existing = document.querySelector('.btn-publish-all');
        if (existing) return;

        const btn = document.createElement('a');
        btn.className = 'btn-publish-all';
        btn.href = '/publish.html';
        btn.target = '_blank';

        const icon = document.createElement('span');
        icon.textContent = '🚀';
        icon.style.fontSize = '24px';

        const text = document.createElement('span');
        text.textContent = 'Опублікувати все';

        btn.append(icon, text);

        btn.addEventListener('click', (e) => {
          e.preventDefault();
          window.open('/publish.html', '_blank');
        });

        document.body.appendChild(btn);
      }

      function waitForCMS() {
        const check = () => {
          if (document.querySelector('[class*="App"]') || document.querySelector('[class*="Sidebar"]') || document.querySelector('[data-testid]')) {
            setTimeout(addButton, 500);
          } else {
            setTimeout(check, 300);
          }
        };
        check();
      }

      document.addEventListener('DOMContentLoaded', waitForCMS);
      if (document.readyState !== 'loading') waitForCMS();
    </script>
  </body>
</html>
