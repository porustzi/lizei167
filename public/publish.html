<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Публікація</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #1e293b;
      border-radius: 2rem;
      padding: 3rem;
      max-width: 600px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    h1 { font-size: 1.5rem; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; margin-bottom: .5rem; }
    h2 { font-size: 2rem; font-weight: 800; margin-bottom: 1rem; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 2rem; }
    .btn-publish {
      display: inline-flex; align-items: center; justify-content: center; gap: 1rem;
      background: linear-gradient(135deg, #dc2626, #b91c1c); color: white; border: none;
      border-radius: 999px; padding: 1.5rem 4rem; font-size: 1.5rem; font-weight: 800;
      cursor: pointer; width: 100%; transition: transform .15s;
      box-shadow: 0 10px 20px -5px rgba(220,38,38,0.4);
    }
    .btn-publish:hover { transform: scale(1.05); }
    .btn-publish:disabled { opacity: .6; cursor: wait; transform: none; }
    .status { margin: 1.5rem 0; padding: 1rem; border-radius: 1rem; font-size: .9rem; display: none; line-height: 1.5; }
    .status.show { display: block; }
    .status.busy { background: #1e293b; color: #fbbf24; border: 1px solid #fbbf24; }
    .status.ok { background: #052e16; color: #4ade80; border: 1px solid #4ade80; }
    .status.err { background: #450a0a; color: #fca5a5; border: 1px solid #dc2626; }
    .info { margin-top: 2rem; padding: 1.5rem; background: #0f172a; border-radius: 1rem; font-size: .875rem; color: #64748b; text-align: left; line-height: 1.8; }
    .info a { color: #60a5fa; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer { margin-top: 2rem; color: #475569; font-size: .75rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ліцей №167</h1>
    <h2>🚀 Публікація змін</h2>
    <p>Всі чернетки будуть змержені в main та задеплоєні.</p>

    <div id="status" class="status"></div>

    <button id="publishBtn" class="btn-publish">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      ОПУБЛІКУВАТИ ВСЕ
    </button>

    <div class="info">
      <strong>Як це працює:</strong><br>
      1️⃣ Редагуєш сайт у <a href="/admin/">Decap CMS</a><br>
      2️⃣ Зміни зберігаються як чернетки (без деплою)<br>
      3️⃣ Натискаєш кнопку → усі чернетки мержаться в main<br>
      4️⃣ Netlify автоматично деплоїть оновлений сайт
    </div>
  </div>

  <footer>Ліцей №167 м. Києва</footer>

  <script>
    var btn = document.getElementById('publishBtn');
    var st = document.getElementById('status');

    function show(type, msg) { st.className = 'status show ' + type; st.innerHTML = msg; }

    btn.onclick = async function() {
      try {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Публікація...';
        show('busy', '🔄 Публікую всі чернетки...');

        var res = await fetch('/.netlify/functions/publish');
        var data = await res.json();

        if (data.merged > 0) {
          show('ok', '✅ ' + data.merged + '/' + data.total + ' чернеток опубліковано! Сайт оновлюється...');
        } else if (data.total === 0) {
          show('ok', '✅ Немає чернеток. Сайт актуальний.');
        } else {
          show('err', '❌ Помилка: ' + (data.results?.filter(function(r){ return r.status !== 'merged'; }).map(function(r){ return r.error || r.status; }).join('; ') || data.error));
        }

        btn.disabled = false;
        btn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> ОПУБЛІКУВАТИ ВСЕ';
      } catch(e) {
        console.error(e);
        btn.disabled = false;
        btn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> ОПУБЛІКУВАТИ ВСЕ';
        show('err', '❌ Помилка: ' + e.message);
      }
    };

    (async function() {
      try {
        var r = await fetch('/.netlify/functions/publish');
        var data = await r.json();
        if (data.total > 0) show('busy', '📝 ' + data.total + ' чернеток очікують публікації');
        else show('ok', '✅ Немає чернеток. Сайт актуальний.');
      } catch(e) {}
    })();
  </script>
</body>
</html>
