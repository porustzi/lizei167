<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Публікація — Ліцей №167</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #1e293b;
      border-radius: 2rem;
      padding: 3rem;
      max-width: 600px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    h1 { font-size: 1.5rem; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; margin-bottom: .5rem; }
    h2 { font-size: 2rem; font-weight: 800; margin-bottom: 1rem; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 2rem; }
    .btn-publish {
      display: inline-flex; align-items: center; justify-content: center; gap: 1rem;
      background: linear-gradient(135deg, #dc2626, #b91c1c); color: white; border: none;
      border-radius: 999px; padding: 1.5rem 4rem; font-size: 1.5rem; font-weight: 800;
      cursor: pointer; width: 100%; transition: transform .15s;
      box-shadow: 0 10px 20px -5px rgba(220,38,38,0.4);
    }
    .btn-publish:hover { transform: scale(1.05); }
    .btn-publish:disabled { opacity: .6; cursor: wait; transform: none; }
    .status { margin: 1.5rem 0; padding: 1rem; border-radius: 1rem; font-size: .9rem; display: none; line-height: 1.5; }
    .status.show { display: block; }
    .status.busy { background: #1e293b; color: #fbbf24; border: 1px solid #fbbf24; }
    .status.ok { background: #052e16; color: #4ade80; border: 1px solid #4ade80; }
    .status.err { background: #450a0a; color: #fca5a5; border: 1px solid #dc2626; }
    .info { margin-top: 2rem; padding: 1.5rem; background: #0f172a; border-radius: 1rem; font-size: .875rem; color: #64748b; text-align: left; line-height: 1.8; }
    .info a { color: #60a5fa; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer { margin-top: 2rem; color: #475569; font-size: .75rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ліцей №167</h1>
    <h2>🚀 Публікація змін</h2>
    <p>Редагуйте сайт через адмінку. Зміни публікуються автоматично.</p>

    <div id="status" class="status"></div>

    <a href="/admin/" class="btn-publish" style="text-decoration:none">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      ВІДКРИТИ АДМІНКУ
    </a>

    <div class="info">
      <strong>Як це працює:</strong><br>
      1️⃣ Відкриваєш <a href="/admin/">адмінку</a><br>
      2️⃣ Додаєш/редагуєш новини, сторінки, відгуки<br>
      3️⃣ Зберігаєш — сайт оновлюється автоматично
    </div>
  </div>

  <footer>Ліцей №167 м. Києва</footer>
</body>
</html>
